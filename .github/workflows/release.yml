name: Release Andclaw

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., v1.0.0)'
        required: true
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Create local.properties
      run: |
        echo "kimi_key=${{ secrets.KIMI_KEY || 'demo_key' }}" > local.properties
        echo "tg_token=${{ secrets.TG_TOKEN || '' }}" >> local.properties
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew :app:assembleDebug --stacktrace
      
    - name: List APK files
      run: |
        echo "=== Debug output ==="
        ls -la app/build/outputs/apk/debug/ || echo "No debug dir"
        echo "=== All APK files ==="
        find . -name "*.apk" -type f
        
    - name: Upload APK to Release
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/*.apk
        tag_name: ${{ github.event.inputs.version || github.ref_name }}
        name: "Andclaw ${{ github.event.inputs.version || github.ref_name }}"
        body: |
          ## 更新内容
          
          ### 优化
          - 修复微信扫码绑定超时问题
          - 优化 HTTP 客户端连接池和超时配置
          - 新增智能轮询和自动重试机制
          - 修复"已有一个OpenClaw连接"问题
          
          ### 安装说明
          1. 下载 APK 文件
          2. 安装到 Android 设备（Android 12+）
          3. 授予无障碍服务权限
          4. 配置 API Key 后即可使用
          
          ### 注意事项
          - 需要 Android 12 (API 31) 或更高版本
          - 需要开启无障碍服务
          - 首次使用需要配置 Kimi Code API Key
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
